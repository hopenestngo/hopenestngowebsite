<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Nest Community NGO</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:45px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            max-width:520px;
        }

        h1{
            color: purple;
            margin-bottom:10px;
            font-size: 20px;
        }

        p{
            color: #000;
            line-height:1.6;
            margin-bottom:10px;
            font-size: 14px;
        }

        .highlight{
            font-weight:bold;
            color:lightgreen;
        }

        .btn-group{
            margin-top:20px;
            display:flex;
            gap:10px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .btn{
            text-decoration:none;
            padding:12px 20px;
            border-radius:6px;
            color:white;
            transition:0.3s;
            min-width:120px;
            text-align:center;
        }

        .donate{
            background: purple;
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 1s;
        }

        .donate:hover{
            background: lightgreen;
        }

        .home{
            background: purple;
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 1s;
        }

        .home:hover{
            background: lightgreen;

        }

      
    </style>
</head>

<body>

<div class="container">


    <h1>Thank You for Your Donation!</h1>

    <p class="highlight">Hope Nest Community NGO</p>

    <p>
        Your generosity helps us support families, children, and community programs in need.
        Every contribution makes a real difference.
    </p>


    <div class="btn-group">
        <a href="donate.html" class="btn donate">Donate Again</a>
        <a href="index.html" class="btn home">Go Back Home</a>
    </div>

</div>

</body>
</html>
