<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope Nest Community NGO</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,.15);
            max-width:500px;
        }

        h1{
            color: purple;
            font-size: 20px;
        }

        p{
            color: #000;
            line-height:1.5;
            font-size: 14px;
        }

         .highlight{
            font-weight:bold;
            color:lightgreen;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            background: purple;
            color:white;
            padding:10px 30px;
            border-radius:50px;
            transition:1s;
            font-size: 14px;
        }

        .btn:hover{
            background: lightgreen;
        }

        .retry{
            background: purple;
        }

        .retry:hover{
            background: lightgreen;
        }

        
    </style>
</head>

<body>

<div class="container">
    <h1>Your donation was not completed!</h1>

    <p class="highlight">Hope Nest Community NGO</p>

    <p>If this was a mistake, you can try again anytime. Your support means a lot to Hope Nest Community NGO.</p>

    <a href="donate.html" class="btn retry">Try Again</a>
    <a href="index.html" class="btn">Go Back Home</a>
</div>

</body>
</html>
