<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Application | Hope Nest Community NGO</title>
    <link rel="stylesheet" href="apply.css">
</head>
<body>

<section class="application-container">

    <div class="application-header">
       <h1>Employment Application Form</h1>
    </div>

   <form id="application-form">

        
        <div class="form-group">
            <label>Position Applying For *</label>
            <select name="position" id="position" required>
                <option value="">Select Position</option>
                <option>Community Volunteer</option>
                <option>IT Specialist</option>
            </select>
        </div>

        <hr>

       

        <h2>Personal Information</h2>

        <div class="form-row">

            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="firstName" required>
            </div>

            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" id="lastName" required>
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" required>
            </div>

        </div>

        <div class="form-group">
            <label>Physical Address</label>
            <input type="text" id="physicalAddress">
        </div>

        <div class="form-row">

            <div class="form-group">
                <label>City</label>
                <input type="text" id="city">
            </div>

            <div class="form-group">
                <label>Country</label>
                <input type="text" id="country">
            </div>

        </div>

        <hr>

        <h2>Education</h2>

        <div class="form-group">
            <label>Highest Qualification *</label>
            <input type="text" id="highestQualification" required>
        </div>

        <div class="form-group">
            <label>Institution</label>
            <input type="text" id="institution">
        </div>

        <div class="form-group">
            <label>Professional Certifications</label>
            <textarea rows="4" id="certification"></textarea>
        </div>

        <hr>

        <h2>Employment Experience</h2>

        <div class="form-group">
            <label>Current/Most Recent Employer</label>
            <input type="text" id="currentEmployer">
        </div>

        <div class="form-group">
            <label>Current Position</label>
            <input type="text" id="currentPosition">
        </div>

        <div class="form-group">
            <label>Years of Experience</label>
            <input type="number" id="yearsExperience">
        </div>

        <div class="form-group">
            <label>Brief Work Experience</label>
            <textarea rows="6" id="experienceSummary"></textarea>
        </div>

        <hr>

        <h2>Skills</h2>

        <div class="form-group">
            <label>Relevant Skills</label>
            <textarea rows="5" id="relevantSkills"></textarea>
        </div>

        <hr>

        <h2>Motivation</h2>

        <div class="form-group">
            <label>
                Why do you want to work with Hope Nest Community NGO?
            </label>

            <textarea rows="7" id="motivation" required></textarea>
        </div>

        <hr>

        <h2>Documents</h2>

        <div class="form-group">
            <label>Upload CV *</label>
            <input type="file" id="cv" required>
        </div>

        <div class="form-group">
            <label>Cover Letter</label>
            <input type="file" id="coverLetter">
        </div>

        <div class="form-group">
            <label>Academic Certificates</label>
            <input type="file" multiple id="certificate">
        </div>

        <hr>

        <div class="form-group">
            <label>

                <input type="checkbox" required>

                I certify that the information provided is true and accurate.

            </label>
        </div>

        <button type="submit" class="submit-btn">
            Submit Application
        </button>

    </form>

</section>

</body>

<script type="module" src="apply.js"></script>
</html>
